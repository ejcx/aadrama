<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Rage Quit">
  <defs>
    <radialGradient id="rqFace" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="55%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <linearGradient id="rqRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="rqSteam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fca5a5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fef2f2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Pin rim -->
  <circle cx="50" cy="52" r="44" fill="url(#rqRim)" stroke="#991b1b" stroke-width="2"/>

  <!-- Angry face -->
  <circle cx="50" cy="52" r="34" fill="url(#rqFace)" stroke="#991b1b" stroke-width="2"/>

  <!-- Steam puffs -->
  <g fill="none" stroke="url(#rqSteam)" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M32 18 Q28 8 34 4 Q30 12 36 14"/>
    <path d="M50 12 Q48 2 54 0 Q50 8 56 10"/>
    <path d="M68 18 Q72 8 66 4 Q70 12 64 14"/>
  </g>

  <!-- Angry brows -->
  <path d="M28 42 L40 48" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round"/>
  <path d="M72 42 L60 48" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="36" cy="54" rx="5" ry="7" fill="#1c1917"/>
  <ellipse cx="64" cy="54" rx="5" ry="7" fill="#1c1917"/>
  <circle cx="38" cy="52" r="1.5" fill="#fef2f2" opacity="0.6"/>

  <!-- Frown -->
  <path
    d="M34 72 Q50 62 66 72"
    fill="none"
    stroke="#7f1d1d"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Banner -->
  <rect x="18" y="80" width="64" height="12" rx="2" fill="#7f1d1d" stroke="#450a0a" stroke-width="1"/>
  <text
    x="50"
    y="89"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="6"
    font-weight="800"
    fill="#fecaca"
    letter-spacing="0.6"
  >RAGE QUIT</text>
</svg>
