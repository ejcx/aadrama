<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Vitality">
  <defs>
    <linearGradient id="vitHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="45%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="vitRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <radialGradient id="vitGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#86efac" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="50" cy="52" r="44" fill="url(#vitRim)" stroke="#4ade80" stroke-width="2"/>
  <circle cx="50" cy="52" r="38" fill="url(#vitGlow)"/>

  <!-- Heart -->
  <path
    d="M50 78
       C50 78 22 58 22 40
       C22 28 30 20 40 20
       C46 20 50 26 50 26
       C50 26 54 20 60 20
       C70 20 78 28 78 40
       C78 58 50 78 50 78 Z"
    fill="url(#vitHeart)"
    stroke="#15803d"
    stroke-width="1.5"
  />

  <!-- Pulse line -->
  <path
    d="M30 48 L38 48 L42 38 L48 58 L54 44 L60 48 L70 48"
    fill="none"
    stroke="#052e16"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- 10 -->
  <circle cx="50" cy="52" r="11" fill="#052e16" stroke="#86efac" stroke-width="1"/>
  <text
    x="50"
    y="56"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="11"
    font-weight="800"
    fill="#bbf7d0"
  >10</text>

  <rect x="20" y="80" width="60" height="12" rx="2" fill="#166534" stroke="#14532d" stroke-width="1"/>
  <text
    x="50"
    y="89"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="6"
    font-weight="800"
    fill="#dcfce7"
    letter-spacing="0.8"
  >VITALITY</text>
</svg>
